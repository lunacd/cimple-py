name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026]
    name: test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Sync
        run: |
          uv sync --all-extras

      - name: Run tests
        run: |
          uv run pytest --cov --cov-branch --cov-report=xml --junitxml=junit.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: lunacd/cimple-py
          flags: ${{ matrix.os }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: lunacd/cimple-py
          flags: ${{ matrix.os }}
          report_type: test_results

  lint:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026]
    name: lint-${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Sync
        run: |
          uv sync --all-extras

      - name: Run pyrefly
        run: |
          uv run pyrefly check .

      - name: Run ruff
        run: |
          uv run ruff check .

      - name: Run ruff-format
        run: |
          uv run ruff format --check --diff .
